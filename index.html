<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Prime Clean</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background: #009688;
            color: #fff;
            padding: 15px 10%;
            text-align: center;
        }
        main {
            padding: 20px 10%;
        }
        h1, h2, h3 {
            color: #444;
        }
        a {
            color: #009688;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        footer {
            text-align: center;
            padding: 10px;
            background: #009688;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Site Prime Clean</h1>
    </header>
    <main>
        <section>
            <h2>About Us</h2>
            <p>We provide high-quality cleaning services.</p>
        </section>
        <section>
            <h2>Services</h2>
            <ul>
                <li>Office Cleaning</li>
                <li>Home Cleaning</li>
                <li>Carpet Cleaning</li>
                <li>Window Cleaning</li>
            </ul>
        </section>
        <section>
            <h2>Contact</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <input type="submit" value="Submit">
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Site Prime Clean</p>
    </footer>
</body>
</html>
